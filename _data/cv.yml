    科研经历:
      - company: 约翰斯·霍普金斯大学 ARCADE Lab
        position: 研究助理
        location: 美国 巴尔的摩
        start_date: 2026-01
        highlights:
          - "导师：Mathias Unberath 教授、博士生 Blanca Inigo Romillo"
          - 基于蒙特卡洛方法开发椎弓根螺钉全胸腰椎（T1–L5）路径规划流水线，处理 742 例患者 CT 网格模型，生成超过 23,000 条经验证轨迹，成功率达 99%。
          - 针对 4 个解剖区域设计自适应约束条件以应对椎弓根形态差异，并实现基于曲面法向量的终板过滤器，完全消除上下表面违规情况。
          - 构建自动化批处理基础设施，涵盖网格质量控制、基于 EDT 的间隙计算及 FCSV 输出，用于 3D Slicer 可视化与验证。

      - company: 动作条件化术中 X 射线视角预测
        position: 基于条件扩散模型的 C 臂引导手术视角规划
        location: 美国 巴尔的摩
        start_date: 2026-03
        highlights:
          - "构建闭环手术视角规划的观测预测模块：给定当前透视图像与候选 6-DoF C 臂运动，条件扩散模型（DDPM 训练 / DDIM 推理）预测目标视角下的 X 射线图像，作为下游 VLM（MedGemma）的视觉预览。"
          - 利用 DeepDRR 从 827 例 CT 体积构建 DRR 训练数据集，每例采样 100 个姿态（5 个椎体中心 × 20 个覆盖正位/侧位/斜位的角度），并按角度与位移距离阈值筛选，每例保留约 1,500 个训练样本对。
          - 设计 U-Net 骨干网络，引入用于源图像条件化的交叉注意力机制，以及用于注入 9 维相对姿态嵌入（6D 旋转 + 3D 位移）的 AdaGroupNorm。
          - 采用混合精度（fp16）在 RTX 3090 上完成 DDPM 训练与 DDIM 推理。

    工作经历:
      - company: 青岛海尔科技有限公司
        position: 软件开发部实习生
        location: 中国 青岛
        start_date: 2024-03
        end_date: 2024-08
        highlights:
          - 利用 Redis 优化高并发场景下的系统性能瓶颈，数据库访问量降低约 40%，整体响应时间显著缩短。
          - 设计并开发批处理机制，有效降低内存消耗。
          - 优化数据库查询语句，避免复杂嵌套查询与全表扫描，为高并发场景添加索引以提升查询性能。
          - 实现延迟双删策略，替代异步监听与可靠消息删除策略，保障缓存一致性。

      - company: 青岛海尔科技有限公司
        position: 软件开发部实习生
        location: 中国 青岛
        start_date: 2023-07
        end_date: 2023-10
        highlights:
          - 保障用户体验云平台高可用性并解决性能崩溃问题；基于 SpringBoot 设计应用程序，采用 PostgreSQL 进行数据存储与建表。
          - 使用 Profiler 定位代码与性能瓶颈，实施算法优化并降低数据库访问频率。
          - 借助阿里云 Prometheus 服务评估内存使用模式，定位对象过度创建、内存泄漏及大对象等主要问题。
          - 采用对象池技术预先创建常用对象，批量处理大数据以降低内存占用，并使用 Bitmap 压缩用户信息数据结构。

      - company: 科大讯飞股份有限公司
        position: 软件开发部实习生
        location: 中国 合肥
        start_date: 2022-12
        end_date: 2023-01
        highlights:
          - 面向水文水利工程领域开发专项语音识别流水线。
          - 收集并处理实地调研数据，通过自定义文本分词脚本从技术规范中提取关键条款与词汇。
          - 基于 Tacotron2_CSMSC 构建语音合成语料库，生成多音色音频并将文本-音频对齐至训练、验证和测试数据集。
          - 在领域语料库上训练并评估多种 ASR 架构——DeepSpeech2、Transformer、Conformer 及讯飞开放平台模型。
          - 根据验证损失筛选 10–25 个最优检查点并融合为最优平均模型。
          - 识别准确率提升 30%，在领域专项评测数据上达到 >99% 的成功率。

